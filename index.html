<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script type="text/javascript">
      (function (l) {
        const isGitHubPagesHost = /\.github\.io$/i.test(l.hostname);
        if (isGitHubPagesHost && l.search[1] === '/') {
          const decoded = l.search
            .slice(1)
            .split('&')
            .map(function (segment) {
              return segment.replace(/~and~/g, '&');
            })
            .join('?');

          window.history.replaceState(
            null,
            '',
            l.pathname.slice(0, -1) + decoded + l.hash,
          );
        }
      })(window.location);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Show an error message on the page if JS fails to load or throws at runtime.
      const showFatalError = (message) => {
        document.body.innerHTML = `\n          <div style="font-family:system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; padding:32px; color:#111; background:#fff; min-height:100vh;">
            <h1 style="font-size:24px; margin-bottom:12px;">Application failed to load</h1>
            <pre style="white-space:pre-wrap; word-break:break-word; background:#f8f8f8; padding:16px; border-radius:8px;">${message}</pre>
            <p style="margin-top:16px; color:#555;">Open the browser console for more details.</p>
          </div>
        `;
      };

      window.addEventListener('error', (event) => {
        showFatalError(event.error?.stack || event.message || String(event));
      });

      window.addEventListener('unhandledrejection', (event) => {
        showFatalError(event.reason?.stack || event.reason || String(event));
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
